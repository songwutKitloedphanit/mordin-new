services:
  # 1. NestJS Backend Web Service
  - type: web
    name: mordin-backend
    runtime: docker
    dockerContext: mordin-backend
    dockerfilePath: mordin-backend/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "3000"
      - key: POSTGRES_HOST
        fromDatabase:
          name: mordin-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: mordin-db
          property: port
      - key: POSTGRES_USER
        fromDatabase:
          name: mordin-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: mordin-db
          property: password
      - key: POSTGRES_DB
        fromDatabase:
          name: mordin-db
          property: database
      - key: POSTGRES_SSL
        value: "true"
      # Log database pointing to the same main DB
      - key: POSTGRES_LOGS_HOST
        fromDatabase:
          name: mordin-db
          property: host
      - key: POSTGRES_LOGS_PORT
        fromDatabase:
          name: mordin-db
          property: port
      - key: POSTGRES_LOGS_USER
        fromDatabase:
          name: mordin-db
          property: user
      - key: POSTGRES_LOGS_PASSWORD
        fromDatabase:
          name: mordin-db
          property: password
      - key: POSTGRES_LOGS_DB
        fromDatabase:
          name: mordin-db
          property: database
      - key: POSTGRES_LOGS_SSL
        value: "true"
      # Secrets (Render will generate random values for these)
      - key: QR_SECRET
        generateValue: true
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRATION
        value: 1d
      # --- Azure AD / Authentication Configuration ---
      - key: AZURE_AD_URL
        value: https://login.microsoftonline.com/common/oauth2/v2.0/token
      - key: CLIENT_ID
        value: dummy_client_id
      - key: CLIENT_SECRET
        value: dummy_client_secret
      - key: APIM_SUBSCRIPTION_KEY
        value: dummy_apim_key
      - key: SCOPE
        value: dummy_scope
      - key: API_AUTHEN_PROFILE_URL
        value: https://apim.example.com/authen/profile
      # --- Mock Admin Login Bypass Credentials (use these for your demo login) ---
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin1234

  # 2. Public PHP Website Web Service
  - type: web
    name: mordin-public
    runtime: docker
    dockerContext: mordin-public
    dockerfilePath: mordin-public/Dockerfile
    plan: free
    envVars:
      # Use public URL for backend API communication due to Render Free Tier limits on private network
      - key: API_BASE_URL
        value: https://mordin-backend.onrender.com/

  # 3. Private React Admin Web Service
  - type: web
    name: mordin-private
    runtime: docker
    dockerContext: mordin-private
    dockerfilePath: mordin-private/Dockerfile
    plan: free
    # Note: Environment variables are automatically passed as build arguments by Render to the Docker build context.
    envVars:
      - key: VITE_API_URL
        value: https://mordin-backend.onrender.com
      - key: VITE_BASE_URL
        value: https://mordin-private.onrender.com
      - key: VITE_PUBLIC_APP_URL
        value: https://mordin-public.onrender.com

databases:
  - name: mordin-db
    plan: free
