server {
    listen 80;
    server_name localhost;

    location /private {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /private/index.html;

        # Add basic cache control for assets
        location ~* \.(?:css|js|woff2?|eot|ttf|otf|svg|png|jpe?g|gif|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, no-transform";
        }
    }

    # Redirect root to /private/
    location / {
        return 301 /private/;
    }
}
